# ── Bluetooth ──────────────────────────────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="ADC_DONGLE"
CONFIG_BT_DEVICE_APPEARANCE=0

# GATT / ATT
CONFIG_BT_GATT_CLIENT=n
CONFIG_BT_ATT_PREPARE_COUNT=0

# ── ADC ────────────────────────────────────────────────────────────────────────
CONFIG_ADC=y

# ── Console / logging ──────────────────────────────────────────────────────────
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y